repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
      - id: trailing-whitespace
        exclude: README\.md
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff-check
        args: [--fix, --show-fixes]

      - id: ruff-format
        alias: ruff-format-diff
        name: ruff-format (show diff)
        args: [--diff]
        verbose: true

      - id: ruff-format
        name: ruff-format (apply fixes)

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8 # Use the latest Prettier tag or SHA
    hooks:
      - id: prettier
        # Optional: Prevent Prettier from trying to format Python files
        # if you prefer using Ruff/Black for .py files
        excludes: [\.py$]
